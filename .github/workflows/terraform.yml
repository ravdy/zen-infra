name: Terraform Dev

on:
  pull_request:
    branches: [main]
    paths:
      - 'envs/dev/**'
      - 'modules/**'
  push:
    branches: [main]
    paths:
      - 'envs/dev/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      action:
        type: choice
        options: [plan, apply, destroy]
        default: plan
      confirm_destroy:
        required: false

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envs/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate

      - run: |
          terraform plan \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.DEV_JWT_SECRET }}" \
            -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: envs/dev/tfplan

  apply:
    needs: plan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: envs/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - run: terraform init

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: envs/dev

      - run: terraform apply -auto-approve tfplan

  destroy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' && github.event.inputs.confirm_destroy == 'destroy'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: envs/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - run: terraform init

      - run: |
          terraform destroy -auto-approve \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}" \
                                                             -var="jwt_secret=${{ secrets.DEV_JWT_SECRET }}"
